{% extends "layout.html" %}
{% block content %}
<div class="acl-shell">
  <div class="acl-header">
    <h1>Articulação de Acesso</h1>
    <div class="acl-actions">
      <button class="btn btn-muted" id="btnReload">Recarregar</button>
      <button class="btn btn-primary" id="btnSaveAll">Salvar alterações</button>
    </div>
  </div>

  <!-- Filtros -->
  <div class="acl-filters">
    <div class="field">
      <label>Buscar recurso</label>
      <input type="text" id="searchResource" class="input" placeholder="Ex.: agenda, cadastro, export_bpai">
    </div>
    <div class="field">
      <label>Ação</label>
      <select id="filterAction" class="select">
        <option value="">Todas</option>
        <option value="view">Visualizar</option>
        <option value="edit">Editar</option>
        <option value="export">Exportar</option>
        <option value="admin">Administrar</option>
      </select>
    </div>
  </div>

  <!-- Grade de recursos -->
  <div class="acl-grid" id="resourceGrid">
    <!-- cards renderizados via JS -->
  </div>
</div>

<!-- Modal -->
<div class="acl-modal" id="aclModal" aria-hidden="true" role="dialog" aria-modal="true">
  <div class="acl-modal__dialog" role="document">
    <div class="acl-modal__header">
      <h3 id="aclModalTitle">Permissões</h3>
      <button class="acl-modal__close" id="closeModal" aria-label="Fechar">✕</button>
    </div>

    <div class="acl-modal__tabs" role="tablist" aria-label="Escopos de permissão">
      <button class="acl-tab active" role="tab" aria-selected="true" aria-controls="tab-roles" id="tabBtnRoles">Papéis</button>
      <button class="acl-tab" role="tab" aria-selected="false" aria-controls="tab-teams" id="tabBtnTeams">Times</button>
      <button class="acl-tab" role="tab" aria-selected="false" aria-controls="tab-users" id="tabBtnUsers">Usuários</button>
    </div>

    <div class="acl-modal__body">
      <!-- ROLES -->
      <section class="acl-panel" id="tab-roles" role="tabpanel" aria-labelledby="tabBtnRoles">
        <div class="acl-bar">
          <div class="pill">Recurso: <span id="badgeResRoles"></span></div>
          <div class="actions">
            <label class="label-inline">Marcar todos:</label>
            <div class="toggle">
              <input type="checkbox" id="rolesCheckAll">
              <span class="track"></span>
              <span class="thumb"></span>
            </div>
          </div>
        </div>
        <div class="acl-matrix" id="rolesMatrix">
          <!-- linhas por papel + colunas por ação -->
        </div>
      </section>

      <!-- TEAMS -->
      <section class="acl-panel is-hidden" id="tab-teams" role="tabpanel" aria-labelledby="tabBtnTeams">
        <div class="acl-bar">
          <div class="pill">Recurso: <span id="badgeResTeams"></span></div>
          <div class="actions">
            <label class="label-inline">Marcar todos:</label>
            <div class="toggle">
              <input type="checkbox" id="teamsCheckAll">
              <span class="track"></span>
              <span class="thumb"></span>
            </div>
          </div>
        </div>
        <div class="acl-matrix" id="teamsMatrix">
          <!-- linhas por time + colunas por ação -->
        </div>
      </section>

      <!-- USERS -->
      <section class="acl-panel is-hidden" id="tab-users" role="tabpanel" aria-labelledby="tabBtnUsers">
        <div class="acl-bar">
          <div class="pill">Recurso: <span id="badgeResUsers"></span></div>
          <div class="actions gap-8">
            <input type="text" class="input input-sm" id="userSearch" placeholder="Buscar usuário por nome ou email">
            <button class="btn btn-muted btn-sm" id="btnClearUserSearch">Limpar</button>
          </div>
        </div>

        <div class="acl-users">
          <div class="acl-users__list" id="userList"></div>
          <div class="acl-users__matrix">
            <div class="acl-users__target">
              <span>Selecionado:</span>
              <strong id="selectedUserLabel">—</strong>
            </div>
            <div class="acl-matrix" id="usersMatrix">
              <!-- colunas por ação com allow/deny -->
            </div>
            <div class="acl-users__reason">
              <label>Motivo (override):</label>
              <textarea id="overrideReason" class="textarea" placeholder="Opcional: por que este usuário tem exceção específica?"></textarea>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="acl-modal__footer">
      <div class="acl-effective" id="effectiveNote">
        <!-- Mostra de onde vem o 'allow' efetivo -->
      </div>
      <div class="footer-actions">
        <button class="btn btn-muted" id="btnCancel">Cancelar</button>
        <button class="btn btn-primary" id="btnSave">Salvar</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
