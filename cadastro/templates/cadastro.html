{% extends "layout.html" %}

{% block extra_css %}
  <link rel="stylesheet" href="{{ url_for('cadastro.static', filename='css/cadastro.css') }}">
{% endblock %}

{% block content %}
<div class="cadastro-container">
  <h2>Cadastro de Paciente</h2>

  <form id="formCadastro" class="form-grid">

    <!-- =========================
         BLOCO 1 · DADOS PESSOAIS
         ========================= -->
    <fieldset>
      <legend>Dados Pessoais</legend>

      <!-- Linha 1 -->
      <div class="campo-quadruplo">
        <div>
          <label>Prontuário (automático):</label>
          <input type="text" id="prontuario" name="prontuario" readonly>
        </div>

        <div>
          <label>Status:</label>
          <select id="status" name="status">
            <option value="ATIVO">Ativo</option>
            <option value="ALTA">Alta</option>
            <option value="DESLIGADO">Desligado</option>
            <option value="ESPERA">Espera</option>
          </select>
        </div>

        <div>
          <label>Modalidade (MOD):</label>
          <select id="mod" name="mod">
            <option value="SEM MOD">SEM MOD</option>
            <option value="FIS">FIS</option>
            <option value="INT">INT</option>
            <option value="AUD">AUD</option>
            <option value="EQUO">EQUO</option>
            <option value="MED">MED</option>
            <option value="VISU">VISU</option>
            <option value="EXAM">EXAM</option>
          </select>
        </div>

        <div>
          <label>Data de admissão (sugestão):</label>
          <input
            type="date"
            id="admissao"
            name="admissao"
            value="{{ admissao_sugestao }}"
          >
        </div>
      </div>

      <!-- Linha 2 -->
      <div class="campo-triplo">
        <div>
          <label>Nome completo:</label>
          <input type="text" id="nome" name="nome" required>
        </div>

        <div>
          <label>Data de nascimento:</label>
          <input type="date" id="nascimento" name="nascimento">
        </div>

        <div>
          <label>Idade:</label>
          <input type="text" id="idade" name="idade" readonly>
        </div>
      </div>

      <!-- Linha 3 -->
      <div class="campo-quintuplo">
        <div>
          <label>Sexo:</label>
          <select id="sexo" name="sexo">
            <option value="">Selecionar…</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
          </select>
        </div>

        <div>
          <label>CID 1:</label>
          <input type="text" id="cid" name="cid" placeholder="Ex: F84.0">
        </div>

        <div>
          <label>CID 2:</label>
          <input type="text" id="cid2" name="cid2" placeholder="Opcional">
        </div>

        <div>
          <label>Raça/Cor:</label>
          <select id="raca" name="raca">
            <option value="">Selecionar…</option>
            <option value="BRANCA">Branca</option>
            <option value="PRETA">Preta</option>
            <option value="PARDA">Parda</option>
            <option value="AMARELA">Amarela</option>
            <option value="INDIGENA">Indígena</option>
            <option value="NAO INFORMADA">Não informada</option>
          </select>
        </div>

        <div>
          <label>Telefone:</label>
          <input type="text" id="telefone1" name="telefone1">
        </div>
      </div>
    </fieldset>

    <!-- =========================
         BLOCO 2 · ENDEREÇO
         ========================= -->
    <fieldset>
      <legend>Endereço</legend>

      <div class="campo-triplo">
        <div>
          <label>Logradouro:</label>
          <input type="text" id="logradouro" name="logradouro">
        </div>

        <div>
          <label>Bairro:</label>
          <input type="text" id="bairro" name="bairro">
        </div>

        <div>
          <label>Nº da Casa:</label>
          <input type="text" id="numero_casa" name="numero_casa">
        </div>
      </div>

      <div class="campo-quadruplo">
        <div>
          <label>Complemento:</label>
          <input type="text" id="complemento" name="complemento">
        </div>

        <div>
          <label>CEP:</label>
          <input type="text" id="cep" name="cep">
        </div>

        <div>
          <label>Município:</label>
          <input type="text" id="municipio" name="municipio">
        </div>

        <div>
          <label>Código do Logradouro:</label>
          <input type="text" id="codigo_logradouro" name="codigo_logradouro">
        </div>
      </div>
    </fieldset>

    <!-- =========================
         BLOCO 3 · DOCUMENTOS
         ========================= -->
    <fieldset>
      <legend>Documentos</legend>

      <div class="campo-triplo">
        <div>
          <label>CPF:</label>
          <input type="text" id="cpf" name="cpf">
        </div>

        <div>
          <label>CNS:</label>
          <input type="text" id="cns" name="cns">
        </div>

        <div>
          <label>Estado Civil:</label>
          <select id="estado_civil" name="estado_civil">
            <option value="">Selecionar…</option>
            <option value="SOLTEIRO">Solteiro(a)</option>
            <option value="CASADO">Casado(a)</option>
            <option value="DIVORCIADO">Divorciado(a)</option>
            <option value="VIUVO">Viúvo(a)</option>
            <option value="UNIAO ESTAVEL">União Estável</option>
          </select>
        </div>
      </div>

      <div class="campo-triplo">
        <div>
          <label>RG:</label>
          <input type="text" id="rg" name="rg">
        </div>

        <div>
          <label>Órgão Exp. RG:</label>
          <input type="text" id="orgao_rg" name="orgao_rg">
        </div>

        <div>
          <label>NIS:</label>
          <input type="text" id="nis" name="nis">
        </div>
      </div>
    </fieldset>

    <!-- =========================
         BLOCO 4 · DADOS FAMILIARES
         ========================= -->
    <fieldset>
      <legend>Dados Familiares</legend>

      <div class="campo-triplo">
        <div>
          <label>Nome da Mãe:</label>
          <input type="text" id="mae" name="mae">
        </div>

        <div>
          <label>CPF da Mãe:</label>
          <input type="text" id="cpf_mae" name="cpf_mae">
        </div>

        <div>
          <label>RG da Mãe:</label>
          <input type="text" id="rg_mae" name="rg_mae">
        </div>
      </div>

      <div class="campo-duplo">
        <div>
          <label>RG SSP Mãe:</label>
          <input type="text" id="rg_ssp_mae" name="rg_ssp_mae">
        </div>

        <div>
          <label>NIS Mãe:</label>
          <input type="text" id="nis_mae" name="nis_mae">
        </div>
      </div>

      <div class="campo-triplo">
        <div>
          <label>Nome do Pai:</label>
          <input type="text" id="pai" name="pai">
        </div>

        <div>
          <label>CPF do Pai:</label>
          <input type="text" id="cpf_pai" name="cpf_pai">
        </div>

        <div>
          <label>RG do Pai:</label>
          <input type="text" id="rg_pai" name="rg_pai">
        </div>
      </div>

      <div class="campo-triplo">
        <div>
          <label>RG SSP Pai:</label>
          <input type="text" id="rg_ssp_pai" name="rg_ssp_pai">
        </div>

        <div>
          <label>Telefone 2:</label>
          <input type="text" id="telefone2" name="telefone2">
        </div>

        <div>
          <label>E-mail:</label>
          <input type="email" id="email" name="email">
        </div>
      </div>
    </fieldset>

    <!-- =========================
         BLOCO 5 · RESPONSÁVEL
         ========================= -->
    <fieldset>
      <legend>Responsável Legal</legend>

      <div class="campo-duplo">
        <div>
          <label>Nome do Responsável:</label>
          <input type="text" id="responsavel" name="responsavel">
        </div>

        <div>
          <label>CPF do Responsável:</label>
          <input type="text" id="cpf_responsavel" name="cpf_responsavel">
        </div>
      </div>

      <div class="campo-triplo">
        <div>
          <label>RG do Responsável:</label>
          <input type="text" id="rg_responsavel" name="rg_responsavel">
        </div>

        <div>
          <label>Órgão Exp. RG:</label>
          <input type="text" id="orgao_rg_responsavel" name="orgao_rg_responsavel">
        </div>

        <div>
          <label>Telefone 3:</label>
          <input type="text" id="telefone3" name="telefone3">
        </div>
      </div>
    </fieldset>

    <button type="submit" class="btn-salvar">
      💾 Salvar Cadastro
    </button>

  </form>
</div>
{% endblock %}

{% block extra_js %}
  <script src="{{ url_for('cadastro.static', filename='js/cadastro.js') }}"></script>
{% endblock %}
