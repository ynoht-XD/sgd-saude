<!-- Bloco 1: Dados principais -->
<fieldset>
  <legend>Dados Pessoais</legend>

  <div class="campo-quadruplo">
    <div>
      <label>Prontuário:</label>
      <input type="text" id="prontuario" name="prontuario" value="{{ paciente.prontuario }}" readonly>
    </div>
    <div>
      <label>Status:</label>
      <select id="status" name="status" disabled>
        <option {{ 'selected' if paciente.status == 'Ativo' else '' }}>Ativo</option>
        <option {{ 'selected' if paciente.status == 'Alta' else '' }}>Alta</option>
        <option {{ 'selected' if paciente.status == 'Desligado' else '' }}>Desligado</option>
        <option {{ 'selected' if paciente.status == 'Espera' else '' }}>Espera</option>
      </select>
    </div>
    <div>
      <label>Modalidade (MOD):</label>
      <select id="mod" name="mod" disabled>
        <option {{ 'selected' if paciente.mod == 'Intelectual' else '' }}>Intelectual</option>
        <option {{ 'selected' if paciente.mod == 'Físico' else '' }}>Físico</option>
        <option {{ 'selected' if paciente.mod == 'Auditivo' else '' }}>Auditivo</option>
        <option {{ 'selected' if paciente.mod == 'Equoterapia' else '' }}>Equoterapia</option>
        <option {{ 'selected' if paciente.mod == 'Visual' else '' }}>Visual</option>
      </select>
    </div>
    <div>
      <label>Data de admissão:</label>
      <input type="date" id="admissao" name="admissao" value="{{ paciente.admissao }}" readonly>
    </div>
  </div>

  <div class="campo-triplo">
    <div>
      <label>Nome completo:</label>
      <input type="text" id="nome" name="nome" value="{{ paciente.nome }}" readonly>
    </div>
    <div>
      <label>Data de nascimento:</label>
      <input type="date" id="nascimento" name="nascimento" value="{{ paciente.nascimento }}" readonly>
    </div>
    <div>
      <label>Idade:</label>
      <input type="text" id="idade" name="idade" value="{{ paciente.idade }}" readonly>
    </div>
  </div>

  <div class="campo-quintuplo">
    <div>
      <label>Sexo:</label>
      <select id="sexo" name="sexo" disabled>
        <option value="">Selecionar...</option>
        <option value="M" {{ 'selected' if paciente.sexo == 'M' else '' }}>Masculino</option>
        <option value="F" {{ 'selected' if paciente.sexo == 'F' else '' }}>Feminino</option>
      </select>
    </div>
    <div>
      <label>CID 1:</label>
      <input type="text" id="cid" name="cid" value="{{ paciente.cid }}" readonly>
    </div>
    <div>
      <label>CID 2:</label>
      <input type="text" id="cid2" name="cid2" value="{{ paciente.cid2 }}" readonly>
    </div>
    <div>
      <label>Raça/Cor:</label>
      <select id="raca" name="raca" disabled>
        {% for r in ['Branca','Preta','Parda','Amarela','Indígena','Não informada'] %}
          <option {{ 'selected' if paciente.raca == r else '' }}>{{ r }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label>Telefone:</label>
      <input type="text" id="telefone1" name="telefone1" value="{{ paciente.telefone1 }}" readonly>
    </div>
  </div>
</fieldset>

<!-- Bloco 2: Endereço -->
<fieldset>
  <legend>Endereço</legend>
  <div class="campo-triplo">
    <div><label>Logradouro:</label><input type="text" id="logradouro" name="logradouro" value="{{ paciente.logradouro }}" readonly></div>
    <div><label>Bairro:</label><input type="text" id="bairro" name="bairro" value="{{ paciente.bairro }}" readonly></div>
    <div><label>Nº da Casa:</label><input type="text" id="numero_casa" name="numero_casa" value="{{ paciente.numero_casa }}" readonly></div>
  </div>
  <div class="campo-quadruplo">
    <div><label>Complemento:</label><input type="text" id="complemento" name="complemento" value="{{ paciente.complemento }}" readonly></div>
    <div><label>CEP:</label><input type="text" id="cep" name="cep" value="{{ paciente.cep }}" readonly></div>
    <div><label>Município:</label><input type="text" id="municipio" name="municipio" value="{{ paciente.municipio }}" readonly></div>
    <div><label>Código do Logradouro:</label><input type="text" id="codigo_logradouro" name="codigo_logradouro" value="{{ paciente.codigo_logradouro }}" readonly></div>
  </div>
</fieldset>

<!-- Bloco 3: Documentos -->
<fieldset>
  <legend>Documentos</legend>
  <div class="campo-triplo">
    <div><label>CPF:</label><input type="text" id="cpf" name="cpf" value="{{ paciente.cpf }}" readonly></div>
    <div><label>CNS:</label><input type="text" id="cns" name="cns" value="{{ paciente.cns }}" readonly></div>
    <div>
      <label>Estado Civil:</label>
      <select id="estado_civil" name="estado_civil" disabled>
        {% for ec in ['Solteiro(a)','Casado(a)','Divorciado(a)','Viúvo(a)','União Estável'] %}
          <option {{ 'selected' if paciente.estado_civil == ec else '' }}>{{ ec }}</option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="campo-triplo">
    <div><label>RG:</label><input type="text" id="rg" name="rg" value="{{ paciente.rg }}" readonly></div>
    <div><label>Órgão Exp. RG:</label><input type="text" id="orgao_rg" name="orgao_rg" value="{{ paciente.orgao_rg }}" readonly></div>
    <div><label>NIS:</label><input type="text" id="nis" name="nis" value="{{ paciente.nis }}" readonly></div>
  </div>
</fieldset>

<!-- Bloco 4: Dados Familiares -->
<fieldset>
  <legend>Dados Familiares</legend>
  <div class="campo-triplo">
    <div><label>Nome da Mãe:</label><input type="text" id="mae" name="mae" value="{{ paciente.mae }}" readonly></div>
    <div><label>CPF da Mãe:</label><input type="text" id="cpf_mae" name="cpf_mae" value="{{ paciente.cpf_mae }}" readonly></div>
    <div><label>RG da Mãe:</label><input type="text" id="rg_mae" name="rg_mae" value="{{ paciente.rg_mae }}" readonly></div>
  </div>
  <div class="campo-duplo">
    <div><label>RG SSP Mãe:</label><input type="text" id="rg_ssp_mae" name="rg_ssp_mae" value="{{ paciente.rg_ssp_mae }}" readonly></div>
    <div><label>NIS Mãe:</label><input type="text" id="nis_mae" name="nis_mae" value="{{ paciente.nis_mae }}" readonly></div>
  </div>
  <div class="campo-triplo">
    <div><label>Nome do Pai:</label><input type="text" id="pai" name="pai" value="{{ paciente.pai }}" readonly></div>
    <div><label>CPF do Pai:</label><input type="text" id="cpf_pai" name="cpf_pai" value="{{ paciente.cpf_pai }}" readonly></div>
    <div><label>RG do Pai:</label><input type="text" id="rg_pai" name="rg_pai" value="{{ paciente.rg_pai }}" readonly></div>
  </div>
  <div class="campo-triplo">
    <div><label>RG SSP Pai:</label><input type="text" id="rg_ssp_pai" name="rg_ssp_pai" value="{{ paciente.rg_ssp_pai }}" readonly></div>
    <div><label>Telefone 2:</label><input type="text" id="telefone2" name="telefone2" value="{{ paciente.telefone2 }}" readonly></div>
    <div><label>E-mail:</label><input type="email" id="email" name="email" value="{{ paciente.email }}" readonly></div>
  </div>
</fieldset>

<!-- Bloco 5: Responsável Legal -->
<fieldset>
  <legend>Responsável Legal</legend>
  <div class="campo-duplo">
    <div><label>Nome do Responsável:</label><input type="text" id="responsavel" name="responsavel" value="{{ paciente.responsavel }}" readonly></div>
    <div><label>CPF do Responsável:</label><input type="text" id="cpf_responsavel" name="cpf_responsavel" value="{{ paciente.cpf_responsavel }}" readonly></div>
  </div>
  <div class="campo-triplo">
    <div><label>RG do Responsável:</label><input type="text" id="rg_responsavel" name="rg_responsavel" value="{{ paciente.rg_responsavel }}" readonly></div>
    <div><label>Órgão Exp. RG:</label><input type="text" id="orgao_rg_responsavel" name="orgao_rg_responsavel" value="{{ paciente.orgao_rg_responsavel }}" readonly></div>
    <div><label>Telefone 3:</label><input type="text" id="telefone3" name="telefone3" value="{{ paciente.telefone3 }}" readonly></div>
  </div>
</fieldset>
