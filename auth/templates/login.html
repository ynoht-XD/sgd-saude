<!-- auth/templates/login.html -->
<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar · SGD</title>

  <!-- estilo base global -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">

  <!-- estilos específicos do login (blueprint auth) -->
  <link rel="stylesheet" href="{{ url_for('auth.static', filename='css/login.css') }}">
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body class="login-page">

  <main class="login-wrap">
    <h1 class="login-title">Entrar no SGD</h1>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        <div class="flash-area">
          {% for cat, m in msgs %}
            <div class="flash {{ cat }}">{{ m }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('auth.login') }}" class="login-form">
      <input type="hidden" name="next" value="{{ request.args.get('next','') }}">

      <label class="label">CPF</label>
      <input class="input" name="cpf" inputmode="numeric" placeholder="Somente números" required>

      <label class="label">Senha</label>
      <div class="input-group password-group">
        <input id="senha" class="input password-input" name="senha" type="password" required>
        <button type="button" class="eye-btn" aria-label="Mostrar senha" data-target="#senha">
          <!-- olho (mostrar) -->
          <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5C5 5 2 12 2 12s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
          </svg>
          <!-- olho cortado (ocultar) -->
          <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M2 4.27 3.28 3 21 20.72 19.73 22l-3.1-3.1A11.93 11.93 0 0 1 12 19C5 19 2 12 2 12a19.2 19.2 0 0 1 4.32-5.74L2 4.27zM12 7a5 5 0 0 1 5 5c0 .86-.22 1.66-.6 2.37l-6.77-6.77C10.34 7.22 11.14 7 12 7zm9.86 5s-.67 1.56-2.1 3.23l-1.45-1.45C18.79 12.13 19 11.09 19 12c0 0 0 0 0 0-.24 1.79-1.48 3.28-3.16 3.79l-1.5-1.5a4.97 4.97 0 0 0 1.66-3.29 5.02 5.02 0 0 0-5-5c-1.25 0-2.4.44-3.29 1.16L6.21 5.79A11.93 11.93 0 0 1 12 5c7 0 9.86 7 9.86 7z"/>
          </svg>
        </button>
      </div>

      <button class="btn" type="submit">Entrar</button>
    </form>

    <p class="hint">Dica: use seu CPF sem pontuação.</p>
  </main>

  <!-- scripts específicos do login -->
  <script src="{{ url_for('auth.static', filename='js/login.js') }}" defer></script>
</body>
</html>
