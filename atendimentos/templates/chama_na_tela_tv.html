<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chamada na Tela · SGD Saúde</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    :root {
      --blue: #2563eb;
      --cyan: #06b6d4;
      --green: #10b981;
      --text: #0f172a;
      --muted: #64748b;
      --line: rgba(148, 163, 184, .28);
      --glass: rgba(255, 255, 255, .78);
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 18%, rgba(37,99,235,.22), transparent 32%),
        radial-gradient(circle at 88% 12%, rgba(16,185,129,.22), transparent 30%),
        radial-gradient(circle at 50% 110%, rgba(6,182,212,.18), transparent 34%),
        linear-gradient(135deg, #f8fafc, #e0f2fe 48%, #ecfdf5);
    }

    body::before, body::after {
      content: "";
      position: fixed;
      border-radius: 999px;
      pointer-events: none;
      filter: blur(2px);
      opacity: .55;
      animation: float 10s ease-in-out infinite alternate;
    }

    body::before {
      width: 280px;
      height: 280px;
      left: 4vw;
      bottom: 8vh;
      background: rgba(37, 99, 235, .14);
    }

    body::after {
      width: 220px;
      height: 220px;
      right: 5vw;
      top: 14vh;
      background: rgba(16, 185, 129, .16);
      animation-delay: -4s;
    }

    .tv-shell {
      width: 100vw;
      height: 100vh;
      padding: clamp(18px, 2.4vw, 36px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto auto;
      gap: clamp(12px, 1.6vw, 20px);
      position: relative;
      z-index: 1;
    }

    .tv-topbar,
    .call-card,
    .history-panel {
      background: var(--glass);
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 30px 90px rgba(15,23,42,.14);
      backdrop-filter: blur(24px);
    }

    .tv-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 22px;
      border-radius: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-icon {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: #fff;
      font-size: 1.65rem;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 14px 30px rgba(37,99,235,.24);
    }

    .brand small {
      display: block;
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .brand strong {
      display: block;
      font-size: clamp(1.2rem, 2vw, 1.9rem);
      line-height: 1.1;
    }

    .clock {
      text-align: right;
    }

    .clock strong {
      display: block;
      font-size: clamp(1.45rem, 2.8vw, 2.5rem);
      line-height: 1;
    }

    .clock span {
      color: var(--muted);
      font-weight: 800;
    }

    .tv-main {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .call-card {
      width: min(1280px, 96vw);
      height: 100%;
      min-height: 0;
      border-radius: clamp(34px, 4vw, 58px);
      padding: clamp(28px, 4vw, 64px);
      display: grid;
      place-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .call-card::before {
      content: "";
      position: absolute;
      inset: -35%;
      background: conic-gradient(
        from 180deg,
        rgba(37,99,235,.11),
        rgba(16,185,129,.15),
        rgba(6,182,212,.13),
        rgba(37,99,235,.11)
      );
      animation: spin 20s linear infinite;
      z-index: -2;
    }

    .call-card::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      background: rgba(255,255,255,.82);
      z-index: -1;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding: 10px 16px;
      border-radius: 999px;
      color: #075985;
      background: rgba(224,242,254,.95);
      border: 1px solid rgba(14,165,233,.22);
      font-weight: 950;
      letter-spacing: .09em;
      text-transform: uppercase;
      font-size: clamp(.85rem, 1.4vw, 1.1rem);
    }

    .pulse-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 0 0 rgba(16,185,129,.45);
      animation: dotPulse 1.5s infinite;
    }

    .waiting {
      margin: 0;
      font-size: clamp(3rem, 7vw, 7rem);
      font-weight: 1000;
      line-height: 1;
      letter-spacing: -.055em;
    }

    .sub {
      margin-top: 20px;
      color: var(--muted);
      font-size: clamp(1.1rem, 2vw, 1.7rem);
      font-weight: 800;
    }

    .patient-name {
      margin: 0;
      color: #0f172a;
      font-size: clamp(4rem, 9vw, 9.2rem);
      line-height: .95;
      font-weight: 1000;
      letter-spacing: -.07em;
      text-wrap: balance;
      text-shadow: 0 18px 44px rgba(15,23,42,.12);
      animation: nameIn .7s cubic-bezier(.2,.8,.2,1);
    }

    .info-grid {
      margin-top: clamp(26px, 3.5vw, 42px);
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .info-pill {
      min-width: min(360px, 88vw);
      padding: 17px 24px;
      border-radius: 26px;
      background: rgba(248,250,252,.92);
      border: 1px solid rgba(148,163,184,.25);
      box-shadow: 0 14px 34px rgba(15,23,42,.06);
    }

    .info-pill span {
      display: block;
      color: var(--muted);
      font-size: .9rem;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 5px;
    }

    .info-pill strong {
      font-size: clamp(1.35rem, 2.4vw, 2.35rem);
      color: #0f172a;
      line-height: 1.1;
    }

    .called-now {
      margin-top: 24px;
      color: #047857;
      font-size: clamp(1rem, 1.8vw, 1.45rem);
      font-weight: 950;
    }

    .history-panel {
      border-radius: 30px;
      padding: 18px;
      min-height: 150px;
    }

    .history-title {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .history-title span {
      display: block;
      color: var(--muted);
      font-size: .82rem;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .history-title strong {
      display: block;
      font-size: clamp(1.1rem, 1.6vw, 1.45rem);
      line-height: 1.1;
    }

    .history-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .history-empty {
      grid-column: 1 / -1;
      color: var(--muted);
      font-weight: 800;
      padding: 18px;
      border: 1px dashed rgba(100,116,139,.28);
      border-radius: 22px;
      background: rgba(248,250,252,.68);
      text-align: center;
    }

    .history-item {
      min-height: 112px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(248,250,252,.86);
      border: 1px solid rgba(148,163,184,.22);
      box-shadow: 0 12px 28px rgba(15,23,42,.06);
      animation: historyIn .35s ease;
      overflow: hidden;
    }

    .history-item:first-child {
      border-color: rgba(37,99,235,.34);
      background: rgba(239,246,255,.94);
    }

    .history-item small {
      display: block;
      color: #0284c7;
      font-weight: 950;
      margin-bottom: 7px;
    }

    .history-item strong {
      display: block;
      font-size: clamp(.98rem, 1.25vw, 1.15rem);
      line-height: 1.15;
      color: var(--text);
    }

    .history-item span {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-weight: 750;
      line-height: 1.25;
      font-size: .92rem;
    }

    .tv-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      color: var(--muted);
      font-weight: 850;
      padding: 0 8px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 9px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--green);
      animation: dotPulse 1.7s infinite;
    }

    .flash {
      animation: cardFlash 1s ease;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes float {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(-24px) scale(1.06); }
    }

    @keyframes dotPulse {
      70% { box-shadow: 0 0 0 16px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }

    @keyframes nameIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(.96);
        filter: blur(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes historyIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardFlash {
      0% { box-shadow: 0 30px 90px rgba(15,23,42,.14); }
      45% { box-shadow: 0 0 0 10px rgba(37,99,235,.16), 0 0 90px rgba(37,99,235,.32); }
      100% { box-shadow: 0 30px 90px rgba(15,23,42,.14); }
    }

    @media (max-width: 1050px) {
      .history-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      html, body { overflow: auto; }

      .tv-shell {
        min-height: 100vh;
        height: auto;
        padding: 14px;
      }

      .tv-topbar,
      .tv-footer {
        flex-direction: column;
        text-align: center;
      }

      .clock { text-align: center; }

      .call-card {
        min-height: 58vh;
      }

      .history-list {
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation: none !important;
        transition: none !important;
      }
    }
  </style>
</head>

<body>
  <div class="tv-shell">
    <header class="tv-topbar">
      <div class="brand">
        <div class="brand-icon">✚</div>
        <div>
          <small>SGD Saúde</small>
          <strong>Chamada de Atendimento</strong>
        </div>
      </div>

      <div class="clock">
        <strong id="horaAtual">--:--</strong>
        <span id="dataAtual">Carregando...</span>
      </div>
    </header>

    <main class="tv-main">
      <section class="call-card" id="tvBox">
        <div id="tvConteudo">
          <div class="eyebrow">
            <span class="pulse-dot"></span>
            Recepção online
          </div>

          <h1 class="waiting">Aguardando chamada</h1>
          <div class="sub">Assim que o paciente for chamado, o nome aparecerá aqui.</div>
        </div>
      </section>
    </main>

    <section class="history-panel">
      <div class="history-title">
        <div>
          <span>Histórico</span>
          <strong>Últimos 4 chamados</strong>
        </div>
        <span>Atualização em tempo real</span>
      </div>

      <div class="history-list" id="historyList">
        <div class="history-empty">Nenhum paciente chamado ainda.</div>
      </div>
    </section>

    <footer class="tv-footer">
      <span class="status">
        <span class="status-dot"></span>
        Sistema de chamada ativo
      </span>
      <span>Por favor, acompanhe a tela</span>
    </footer>
  </div>

<script>
  let ultimaChamadaId = 0;
  let filaChamadas = [];
  let processandoFila = false;
  let historicoChamadas = [];

  const API_FILA = "/atendimentos/chama-na-tela/api/fila";
  const API_RECENTES = "/atendimentos/chama-na-tela/api/recentes";

  function atualizarRelogio() {
    const agora = new Date();

    document.getElementById("horaAtual").textContent = agora.toLocaleTimeString("pt-BR", {
      hour: "2-digit",
      minute: "2-digit"
    });

    const data = agora.toLocaleDateString("pt-BR", {
      weekday: "long",
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    document.getElementById("dataAtual").textContent =
      data.charAt(0).toUpperCase() + data.slice(1);
  }

  async function carregarHistoricoInicial() {
    try {
      const resp = await fetch(API_RECENTES, { cache: "no-store" });
      const data = await resp.json();

      if (!data.ok || !Array.isArray(data.chamadas)) return;

      historicoChamadas = data.chamadas.map(item => ({
        id: item.id,
        paciente_nome: item.paciente_nome || "",
        profissional_nome: item.profissional_nome || "",
        cbo: item.cbo || "",
        horario: formatarHora(item.criado_em)
      }));

      if (historicoChamadas.length) {
        ultimaChamadaId = Number(historicoChamadas[0].id || 0);

        renderizarHistorico();

        const ultima = data.chamadas[0];
        renderizarChamada(ultima, false);
      }
    } catch (err) {
      console.warn("Erro ao carregar histórico:", err);
    }
  }

  async function buscarNovasChamadas() {
    try {
      const resp = await fetch(`${API_FILA}?after_id=${encodeURIComponent(ultimaChamadaId)}`, {
        cache: "no-store"
      });

      const data = await resp.json();

      if (!data.ok || !Array.isArray(data.chamadas) || !data.chamadas.length) return;

      filaChamadas.push(...data.chamadas);
      ultimaChamadaId = Math.max(
        ultimaChamadaId,
        ...data.chamadas.map(c => Number(c.id || 0))
      );

      processarFila();
    } catch (err) {
      console.warn("Erro ao buscar fila:", err);
    }
  }

  async function processarFila() {
    if (processandoFila) return;
    processandoFila = true;

    while (filaChamadas.length) {
      const chamada = filaChamadas.shift();

      adicionarAoHistorico(chamada);
      renderizarChamada(chamada, true);
      tocarSomPremium();

      await esperar(4500);
    }

    processandoFila = false;
  }

  function adicionarAoHistorico(chamada) {
    historicoChamadas = [
      {
        id: chamada.id,
        paciente_nome: chamada.paciente_nome || "",
        profissional_nome: chamada.profissional_nome || "",
        cbo: chamada.cbo || "",
        horario: formatarHora(chamada.criado_em)
      },
      ...historicoChamadas.filter(item => Number(item.id) !== Number(chamada.id))
    ].slice(0, 4);

    renderizarHistorico();
  }

  function renderizarHistorico() {
    const list = document.getElementById("historyList");

    if (!historicoChamadas.length) {
      list.innerHTML = `<div class="history-empty">Nenhum paciente chamado ainda.</div>`;
      return;
    }

    list.innerHTML = historicoChamadas.map((item, index) => `
      <article class="history-item">
        <small>${index === 0 ? "Chamado agora" : escapeHtml(item.horario)}</small>
        <strong>${escapeHtml(item.paciente_nome || "Paciente")}</strong>
        <span>
          ${item.profissional_nome ? `Profissional: ${escapeHtml(item.profissional_nome)}` : "Profissional não informado"}
          ${item.cbo ? `<br>CBO: ${escapeHtml(item.cbo)}` : ""}
        </span>
      </article>
    `).join("");
  }

  function renderizarChamada(chamada, comVoz = true) {
    const box = document.getElementById("tvBox");
    const conteudo = document.getElementById("tvConteudo");

    const profissional = chamada.profissional_nome
      ? `
        <div class="info-pill">
          <span>Profissional</span>
          <strong>${escapeHtml(chamada.profissional_nome)}</strong>
        </div>
      `
      : "";

    const cbo = chamada.cbo
      ? `
        <div class="info-pill">
          <span>CBO do profissional</span>
          <strong>${escapeHtml(chamada.cbo)}</strong>
        </div>
      `
      : "";

    conteudo.innerHTML = `
      <div class="eyebrow">
        <span class="pulse-dot"></span>
        Paciente chamado
      </div>

      <h1 class="patient-name">${escapeHtml(chamada.paciente_nome || "Paciente")}</h1>

      <div class="info-grid">
        ${profissional}
        ${cbo}
      </div>

      <div class="called-now">Chamado agora</div>
    `;

    box.classList.remove("flash");
    void box.offsetWidth;
    box.classList.add("flash");

    if (comVoz) falarChamada(chamada);
  }

  function tocarSomPremium() {
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const audioCtx = new AudioContext();

      const gain = audioCtx.createGain();
      gain.gain.value = 0.075;
      gain.connect(audioCtx.destination);

      [659, 784, 988].forEach((freq, index) => {
        const osc = audioCtx.createOscillator();
        osc.type = "sine";
        osc.frequency.value = freq;
        osc.connect(gain);
        osc.start(audioCtx.currentTime + index * 0.16);
        osc.stop(audioCtx.currentTime + index * 0.16 + 0.14);
      });

      setTimeout(() => audioCtx.close(), 850);
    } catch (e) {}
  }

  function falarChamada(chamada) {
    if (!("speechSynthesis" in window)) return;

    const nome = chamada.paciente_nome || "";
    const profissional = chamada.profissional_nome || "";

    let texto = nome;

    if (profissional) {
      texto += `. Atendimento com ${profissional}.`;
    }

    const fala = new SpeechSynthesisUtterance(texto);
    fala.lang = "pt-BR";
    fala.rate = 0.82;
    fala.pitch = 1;

    speechSynthesis.cancel();

    setTimeout(() => {
      speechSynthesis.speak(fala);
    }, 450);
  }

  function formatarHora(valor) {
    if (!valor) return "--:--";

    const data = new Date(valor);
    if (Number.isNaN(data.getTime())) return "--:--";

    return data.toLocaleTimeString("pt-BR", {
      hour: "2-digit",
      minute: "2-digit"
    });
  }

  function esperar(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
  }

  function escapeHtml(texto) {
    return String(texto || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  atualizarRelogio();
  carregarHistoricoInicial();

  setInterval(atualizarRelogio, 1000);
  setInterval(buscarNovasChamadas, 5000);
</script>
</body>
</html>
