{% extends "layout.html" %}

{% block title %}{{ titulo }} · Procedimentos{% endblock %}

{% block content %}

<div class="page-head">
  <h2>{{ titulo }}</h2>
  <a href="{{ url_for('procedimentos.index') }}" class="btn-outline">← Voltar</a>
</div>

<section class="page-card">

  <form method="post">

    <div class="grid-2">
      <label>Código
        <input name="codigo" value="{{ proc.codigo if proc else '' }}" required>
      </label>

      <label>Faixa Etária
        <input name="idade" placeholder="Ex.: 0-12, 13-17"
               value="{{ proc.idade if proc else '' }}">
      </label>
    </div>

    <div class="grid-1">
      <label>Descrição
        <input name="descricao" value="{{ proc.descricao if proc else '' }}" required>
      </label>
    </div>

    <div class="grid-1">
      <label>CIDs Permitidos
        <input name="cid" placeholder="Separar por vírgula"
               value="{{ proc.cid if proc else '' }}">
      </label>
    </div>

    <div class="grid-1">
      <label>CBOs Permitidos
        <input name="cbo" placeholder="Separar por vírgula"
               value="{{ proc.cbo if proc else '' }}">
      </label>
    </div>

    <div class="grid-1">
      <label>Observações
        <textarea name="obs" rows="3">{{ proc.obs if proc else '' }}</textarea>
      </label>
    </div>

    <div class="form-actions">
      <button class="btn-primary">Salvar</button>
    </div>

  </form>

</section>

{% endblock %}
